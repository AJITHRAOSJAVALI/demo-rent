<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Namma Rent | Executive Dashboard</title>
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="area-list.css"> <link rel="stylesheet" href="dashboard.css">
</head>
<body>

    <div class="dash-container">
        <header class="dash-header">
            <h1>Executive Control</h1>
            <p>Bengaluru Service Management</p>
        </header>

        <div class="dash-grid">
            <section class="dash-card">
                <div id="area-module-placeholder"></div>
            </section>

            <section class="dash-card">
                <h3>Verify New Listing</h3>
                <div class="form-group">
                    <label>Property Name</label>
                    <input type="text" id="propName" placeholder="e.g., Green Garden PG">
                </div>
                <div class="form-group">
                    <label>Assigned Area</label>
                    <select id="areaDropdown"></select>
                </div>
                <button class="btn-primary" onclick="AdminManager.verifyAndPublish()">
                    Publish to Market
                </button>
            </section>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="firebase-config.js"></script>
    <script src="area-service.js"></script>
    <script src="admin-service.js"></script>

    <script>
        // Use DOT connection to setup the page
        AreaManager.loadInterface('area-module-placeholder');
        AdminManager.init();
    </script>
</body>
</html>
