<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <main class="dashboard">
    <header class="search-header">
        <input type="text" id="searchBar" placeholder="Search areas (e.g., HSR Layout, Indiranagar)...">
    </header>

    <div class="property-grid" id="propertyGrid">
        <div class="property-card">
            <div class="image-placeholder">📸 Apartment Photo</div>
            <div class="card-content">
                <span class="tag">1BHK</span>
                <h3>Cozy Flat in HSR Layout</h3>
                <p class="location">Sector 7, Near BDA Complex</p>
                <div class="price-info">
                    <span class="rent">₹18,000/mo</span>
                    <span class="deposit">Deposit: ₹50k</span>
                </div>
                <button class="view-btn">View Details</button>
            </div>
        </div>

        <div class="property-card">
            <div class="image-placeholder">📸 PG Photo</div>
            <div class="card-content">
                <span class="tag">Shared Room</span>
                <h3>Modern PG in Koramangala</h3>
                <p class="location">4th Block, Near Sony Signal</p>
                <div class="price-info">
                    <span class="rent">₹12,000/mo</span>
                    <span class="deposit">Deposit: ₹20k</span>
                </div>
                <button class="view-btn">View Details</button>
            </div>
        </div>
    </div>
</main>
</body>
</html>
