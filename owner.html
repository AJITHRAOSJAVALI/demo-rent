<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Namma Rent | Owner Hub</title>
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="owner.css">
</head>
<body>

    <div class="owner-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h3>Namma Residents</h3>
            </div>
            <div id="upcomingTenants" class="tenant-list">
                </div>
            <div class="commission-footer">
                <small>Commission Due</small>
                <h2 id="totalComm">₹0.00</h2>
            </div>
        </aside>

        <main class="grid-main">
            <header class="grid-header">
                <h2 id="propNameDisplay">My Property</h2>
                <div class="legend">
                    <span class="dot empty"></span> Empty
                    <span class="dot unpaid"></span> Unpaid
                    <span class="dot paid"></span> Paid
                </div>
            </header>

            <div id="roomGrid" class="occupancy-grid"></div>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="firebase-config.js"></script>
    <script src="owner-service.js"></script>

    <script>
        // Use DOT connection to initialize the page
        OwnerManager.initHub();
    </script>
</body>
</html>
