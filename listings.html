<!DOCTYPE html>
<html>
<head>
    <title>Namma Rent | Search</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Verified Properties</h1>
        <div class="form-group">
    <input type="text" id="searchInput" onkeyup="searchProperties()" placeholder="Search by name or location (e.g. HSR)...">
</div>
        <div id="listingsGrid" class="listings-grid"></div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">

            <hr>
            <h4>Room Inventory</h4>
            <div id="mLayout"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
