<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Namma Rent - Welcome</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background: linear-gradient(135deg, #007bff 0%, #00d4ff 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }

        .hero-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 600px;
        }

        h1 { font-size: 3rem; margin-bottom: 10px; }
        p { font-size: 1.2rem; margin-bottom: 30px; opacity: 0.9; }

        .btn-group {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .main-btn {
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            text-decoration: none;
            border-radius: 50px;
            transition: 0.3s;
            cursor: pointer;
        }

        .owner-btn {
            background-color: white;
            color: #007bff;
        }

        .tenant-btn {
            background-color: transparent;
            color: white;
            border: 2px solid white;
        }

        .main-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div class="hero-card">
        <h1>Namma Rent 🏠</h1>
        <p>The smartest way to find and manage PGs in Bengaluru.</p>
        
        <div class="btn-group">
            <a href="tenant.html" class="main-btn tenant-btn">I'm a Tenant</a>
            <a href="dashboard.html" class="main-btn owner-btn">I'm an Owner</a>
        </div>
    </div>

</body>
</html>
