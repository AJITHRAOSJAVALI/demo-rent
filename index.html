<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Namma Rent | Welcome</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<link rel="stylesheet" href="global.css">
<link rel="stylesheet" href="auth.css">
    </head>
<body>

    <div class="logo-container">
        <div class="logo-triangle"></div>
        <div class="logo-square"></div>
        <div class="brand-name">NAMMA RENT</div>
    </div>

    <div class="login-card">
    <h2 id="formTitle">Member Login</h2>
    <form id="authForm">
        <div class="input-group">
            <label>Phone Number</label>
            <input type="number" id="userPhone" placeholder="10-digit mobile" required>
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="userPass" placeholder="Enter password" required>
        </div>
        
        <div id="signUpFields" style="display: none;">
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="userName" placeholder="Your Name">
            </div>
            <div class="input-group">
                <label>Register As</label>
                <select id="userRole" style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px;">
                    <option value="tenant">Tenant (Looking for PG)</option>
                    <option value="owner">Owner (Have a Property)</option>
                </select>
            </div>
        </div>

        <button type="submit" class="login-btn" id="submitBtn">Secure Login</button>
    </form>
    
    <p class="footer-text">
        <span id="toggleText">Don't have an account?</span> 
        <a href="#" id="toggleAuth" style="color: var(--namma-green); font-weight: bold; text-decoration: none;">Sign Up</a>
    </p>
</div>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script src="firebase-config.js"></script>

<script src="auth-service.js"></script>
</body>
</html>
