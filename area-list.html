<div class="area-card">
    <div class="area-header">
        <h3>📍 Bengaluru Area Manager</h3>
        <p>Add or select operating zones for Namma Rent</p>
    </div>

    <div class="area-body">
        <label>Current Operating Areas</label>
        <select id="areaDropdown" class="area-select">
            <option>Loading Bengaluru areas...</option>
        </select>

        <hr>

        <label>Add New Service Area</label>
        <div class="area-input-group">
            <input type="text" id="newAreaInput" placeholder="e.g., Indiranagar">
            <button class="add-area-btn" onclick="AreaManager.addNew(document.getElementById('newAreaInput').value)">
                Add to List
            </button>
        </div>
    </div>
</div>
