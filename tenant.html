<!DOCTYPE html>
<html>
<head><title>Namma Rent | Tenants</title><link rel="stylesheet" href="style.css">
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
</head>
<body>
    <nav class="admin-nav"><div class="logo">Namma Rent</div></nav>
    <div class="container">
        <div class="card" style="display:flex; gap:10px; align-items:flex-end; flex-wrap:wrap;">
            <div style="flex:1"><label>Location</label><input type="text" id="fLoc" onkeyup="applyFilters()" placeholder="HSR..."></div>
            <div style="flex:1"><label>Type</label><select id="fType" onchange="applyFilters()"><option value="All">All</option><option value="PG">PG</option><option value="1BHK">1BHK</option></select></div>
            <div style="flex:1"><label>Max Budget</label><input type="number" id="fPrice" onkeyup="applyFilters()" placeholder="Max Rent"></div>
        </div>
        <div id="tenantGrid" class="listings-grid"></div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <span onclick="closeModal()" style="float:right; cursor:pointer; font-size:28px;">&times;</span>
            <h2 id="mTitle"></h2>
            <div id="mFeats" style="margin-bottom:15px;"></div>
            <a id="mMap" target="_blank" class="btn" style="background:#4285F4; text-decoration:none; display:block; text-align:center;">📍 View on Google Maps</a>
            <h4>Gallery</h4>
            <div id="mImgs" style="display:flex; gap:10px; overflow-x:auto; padding-bottom:10px;"></div>
            <hr>
            <h4>Live Bed Availability</h4>
            <div id="mLayout"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
